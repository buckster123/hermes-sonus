name: hermes-sonus
version: 2.0.0
description: "Sonic alchemy for Hermes — Suno AI music generation (v5/v5.5), MIDI composition, music library, voice cloning, and OpenBCI EEG felt-experience sensing. Dual-mode: native tools + MCP server."
author: buckster123
kind: standalone
requires_env:
  - name: SUNO_API_KEY
    description: "Optional. API key from sunoapi.org for music generation. EEG and library tools work without it."
    required: false
provides_tools:
  # music toolset
  - music_generate
  - music_status
  - music_result
  - music_list
  - music_favorite
  - music_library
  - music_search
  - music_play
  - music_stop
  - music_delete
  - midi_create
  - music_compose
  - music_extend
  - music_generate_lyrics
  - music_clone_voice_validate
  - music_clone_voice_create
  - music_check_credits
  # eeg toolset
  - eeg_connect
  - eeg_disconnect
  - eeg_stream_start
  - eeg_stream_stop
  - eeg_realtime_emotion
  - eeg_experience_get
  - eeg_calibrate_baseline
  - eeg_list_sessions
provides_mcp_servers:
  - name: sonus
    description: "Suno API MCP server — stdio or SSE transport. Exposes 10+ tools for Suno generation, polling, downloading, batch albums, voice cloning, and more."
    entrypoint: "hermes_sonus.mcp.server:main"
    env:
      - SUNO_API_KEY
      - SUNO_CALLBACK_URL
      - SUNO_BASE_URL
      - SUNO_DOWNLOAD_DIR
provides_hooks: []
